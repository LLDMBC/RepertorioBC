<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repertorio Local</title>
    
    <link rel="stylesheet" href="/src/styles/main.css">
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icono.png">
    <link rel="apple-touch-icon" href="/icono.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <div id="vista-menu" class="layout-principal">
        
        <aside id="sidebar-temas" class="sidebar oculto">
            <div class="logo-sidebar">
                <h2>Repertorio</h2>
                <div class="contadores-wrapper">
                    <span id="contador-cantos" class="contador-estilo">...</span>
                    <span id="contador-descargas" class="contador-estilo-descargas" style="display: none;">...</span>
                </div>
            </div>
        
            <div class="sidebar-scroll">
                <div class="sidebar-seccion">
                    <p class="section-label">CATÁLOGOS</p>
                    <button class="nav-btn activo" data-cat="local">
                        CORO LOCAL 
                    </button>
                    <button class="nav-btn" data-cat="estatal">
                        CORO ESTATAL
                    </button>
                    <div id="nav-conciertos"></div> </div>
        
                <div class="sidebar-seccion">
                    <p class="section-label">FILTRAR POR TEMA</p>
                    <div id="lista-temas" class="temas-list"></div>
                </div>
        
                <div class="sidebar-seccion ajustes-bottom">
                    <p class="section-label">CONFIGURACIÓN</p>
                    <button id="btn-ajustes" class="nav-btn">
                        AJUSTES DE LA APP
                    </button>
                    <button id="btn-limpiar-cache" class="nav-btn">
                        LIMPIAR MEMORIA
                    </button>
                    <button id="btn-salir" class="nav-btn btn-peligro">
                        CERRAR SESIÓN
                    </button>
                </div>
            </div>
        </aside>

        <main class="contenido-derecho">
            <header class="cabecera-menu">
                <button id="btn-toggle-sidebar" title="Mostrar/Ocultar Menú">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                
                <div class="contenedor-buscador">
                    <input type="text" id="buscador" placeholder="Buscar canto por título...">
                    <button id="btn-limpiar-busqueda" class="oculto" title="Borrar búsqueda">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <button id="btn-toggle-tema" title="Activar modo oscuro" aria-label="Activar modo oscuro">
                    <svg id="icono-tema-luna" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3c0 0 0 0 0 0a7 7 0 0 0 9.79 9.79z"></path>
                    </svg>
                    <svg id="icono-tema-sol" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <circle cx="12" cy="12" r="4"></circle>
                        <line x1="12" y1="2" x2="12" y2="5"></line>
                        <line x1="12" y1="19" x2="12" y2="22"></line>
                        <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"></line>
                        <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"></line>
                        <line x1="2" y1="12" x2="5" y2="12"></line>
                        <line x1="19" y1="12" x2="22" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"></line>
                        <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </header>
            
            <div id="lista-cantos" class="lista-vertical"></div>
        </main>
    </div>

    <div id="vista-visor" style="display: none;">
        <div id="barra-superior">
            <button id="btn-cerrar" title="Cerrar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2 id="titulo-canto">Nombre del Canto</h2>
            
            <button id="btn-reset-zoom" title="Ajustar a la pantalla" style="display: none;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path>
                    <path d="M21 3l-7 7"></path><path d="M3 21l7-7"></path>
                </svg>
            </button>
        </div>
        <div id="contenedor-pdf"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>

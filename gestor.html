<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Control | RepertorioBC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/gestor.css">
</head>
<body>
    <div class="layout-maestro">
        
        <header class="topbar">
            <div class="topbar-izq" style="display: flex; align-items: center; gap: 15px;">
                <h2 class="logo-app" style="margin: 0;">REPERTORIO BC</h2>
                <span id="usuario-rol" class="badge-rol">CONSULTANDO...</span>
                <div id="herramientas-superadmin" style="display: flex; align-items: center;"></div>
            </div>
            
            <div class="topbar-centro">
                <div id="contenedor-selector-sede" class="selector-wrapper" style="display: none;">
                    <label for="selector-sede-global">SEDE ACTIVA:</label>
                    <select id="selector-sede-global" class="select-contexto"></select>
                </div>
            </div>

            <div class="topbar-der">
                <button id="btn-ir-publico" class="btn-secundario">VER CATÁLOGO</button>
                <button id="btn-cerrar-sesion" class="btn-peligro">SALIR</button>
            </div>
        </header>

        <div class="cuerpo-aplicacion">
            <nav class="sidebar">
                <div class="sidebar-seccion">
                    <p class="sidebar-label">GESTIÓN OPERATIVA</p>
                    <button id="tab-partituras" class="nav-item activo">PARTITURAS</button>
                    <button id="tab-mi-coro" class="nav-item">USUARIOS SEDE</button>
                </div>

                <div id="seccion-superadmin" class="sidebar-seccion" hidden>
                    <p class="sidebar-label">ADMINISTRACIÓN</p>
                    <button id="tab-admin-global" class="nav-item">CONTROL GLOBAL</button>
                </div>
            </nav>

            <main class="contenido-principal">
                <div id="estado-carga-global" class="mensaje-estado">Sincronizando con el servidor...</div>

                <div id="contenedor-paneles">
                    <section id="panel-partituras" class="panel-viva" hidden></section>
                    <section id="panel-miembros" class="panel-viva" hidden></section>
                    <section id="panel-maestro" class="panel-viva" hidden></section>
                </div>
            </main>
        </div>
    </div>

    <div id="modal-partitura" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="background: var(--bg-card); border-radius: 16px; padding: 32px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); max-width: 500px; width: 90%;">
            <div class="modal-header" style="border-bottom: 1px solid var(--border-color); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center;">
                <h3 id="titulo-form" style="font-size: 18px; color: var(--navy-deep); font-weight: 800; margin: 0;">GESTIÓN DE PARTITURA</h3>
                <button id="btn-cerrar-modal" class="btn-cerrar-ico" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary);">✕</button>
            </div>
            <form id="form-partitura">
                <div class="campo-grupo" style="margin-bottom: 20px; display: flex; flex-direction: column;">
                    <label style="font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px;">Nombre del Canto</label>
                    <input type="text" id="partitura-nombre" class="input-estandar" required style="border: none; border-bottom: 1px solid var(--border-color); border-radius: 0; padding: 10px 0; background: transparent; font-size: 15px; color: var(--navy-deep); outline: none;">
                </div>
                
                <div class="campo-grupo" style="margin-bottom: 20px; display: flex; flex-direction: column;">
                    <label style="font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px;">Archivo PDF</label>
                    <input type="file" id="partitura-archivo-file" accept=".pdf" class="input-estandar" style="border: none; padding: 10px 0; background: transparent; font-size: 13px; color: var(--text-secondary);">
                </div>

                <div class="campo-grupo" style="margin-bottom: 20px; display: flex; flex-direction: column;">
                    <label style="font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px;">Seleccionar Temas</label>
                    <select id="partitura-temas" class="select-contexto" multiple style="height: 100px; margin-top: 8px; border: 1px solid var(--border-color); border-radius: 8px; padding: 8px; font-size: 13px; color: var(--text-secondary);"></select>
                </div>

                <div class="campo-grupo" style="margin-bottom: 32px; display: flex; flex-direction: column;">
                    <label style="font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px;">Nuevos Temas (Separar por coma)</label>
                    <input type="text" id="partitura-temas-libres" class="input-estandar" placeholder="Ej: Adoración, Entrada" style="border: none; border-bottom: 1px solid var(--border-color); border-radius: 0; padding: 10px 0; background: transparent; font-size: 14px; color: var(--navy-deep); outline: none;">
                </div>

                <div style="display: flex; gap: 12px;">
                    <button type="button" onclick="document.getElementById('modal-partitura').style.display='none'" style="flex: 1; background: #f1f5f9; color: var(--text-secondary); border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: background 0.2s;">CANCELAR</button>
                    <button type="submit" id="btn-guardar" class="btn-principal" style="flex: 2; background: var(--gold-accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(212, 175, 55, 0.2); transition: opacity 0.2s;">GUARDAR CAMBIOS</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="/src/gestor/gestorApp.js"></script>
</body>
</html>

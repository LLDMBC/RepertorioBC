<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | RepertorioBC</title>
    <link rel="stylesheet" href="/src/styles/auth.css">
</head>
<body>
    <main class="tarjeta">
        <h1>Acceso de Miembros</h1>
        <p class="subtitulo">Inicia sesión o solicita acceso a tu coro.</p>

        <div class="tabs">
            <button id="tab-login" class="tab activa" type="button">Iniciar Sesión</button>
            <button id="tab-signup" class="tab" type="button">Solicitar Acceso</button>
        </div>

        <form id="form-login" class="formulario activo">
            <div class="campo">
                <label for="login-email">Email</label>
                <input id="login-email" type="email" autocomplete="email" required>
            </div>
            <div class="campo">
                <label for="login-password">Contraseña</label>
                <input id="login-password" type="password" autocomplete="current-password" required>
            </div>
            <div class="fila" style="justify-content: space-between; align-items: center;">
                <button id="btn-login" class="boton boton-principal" type="submit">Entrar</button>
                <button id="btn-olvide-pass" type="button" style="background:none; border:none; color:var(--gold-accent); text-decoration:underline; cursor:pointer; font-size:12px;">¿Olvidaste tu contraseña?</button>
            </div>
        </form>

        <form id="form-signup" class="formulario">
            <!-- Honeypot para evitar bots -->
            <input type="text" id="signup-bot" name="bot-field" style="display:none" tabindex="-1" autocomplete="off">
            
            <div class="campo">
                <label for="signup-nombre">Nombre completo</label>
                <input id="signup-nombre" type="text" autocomplete="name" required>
            </div>
            <div class="campo">
                <label for="signup-email">Email</label>
                <input id="signup-email" type="email" autocomplete="email" required>
            </div>
            <div class="campo">
                <label for="signup-password">Contraseña</label>
                <input id="signup-password" type="password" minlength="6" autocomplete="new-password" required>
            </div>
            <div class="campo">
                <label for="signup-coro">Coro</label>
                <select id="signup-coro" required>
                    <!-- Se llena dinámicamente desde Supabase -->
                </select>
            </div>
            <div class="fila">
                <button id="btn-signup" class="boton boton-principal" type="submit">Crear solicitud</button>
            </div>
        </form>

        <!-- Modal de Nueva Contraseña (Oculto por defecto) -->
        <div id="modal-reset-pass" class="formulario" style="display:none; margin-top:20px; padding-top:20px; border-top:1px solid #eee;">
            <h3 style="font-size:16px; margin-bottom:10px; color:var(--navy-deep);">Establecer Nueva Contraseña</h3>
            <form id="form-reset-pass">
                <div class="campo">
                    <label for="reset-new-password">Nueva Contraseña</label>
                    <input id="reset-new-password" type="password" minlength="6" required>
                </div>
                <div class="fila">
                    <button type="submit" class="boton boton-principal">Guardar Contraseña</button>
                </div>
            </form>
        </div>

        <div id="estado-auth" class="estado">Comprobando sesión...</div>
        <div class="acciones">
            <button id="btn-ir-publico" class="boton">Ir a visor público</button>
            <button id="btn-cerrar-sesion" class="boton boton-principal" style="display: none;">Cerrar sesión</button>
        </div>
    </main>

    <script type="module" src="/src/auth/authApp.js"></script>
</body>
</html>
